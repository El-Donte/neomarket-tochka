services:
  api:
    build: .
    container_name: marketplace_by_procrastination
    ports:
      - "8080:8080"
    volumes:
      - .:/app  # Монтируем корень проекта в /app контейнера
    environment:
      DATABASE_URL: postgresql://marketplace:procrastination67@db:5432/marketplace_db
    depends_on:
      - db
    
  db:
    image: postgres:16
    container_name: marketplace_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: procrastination67
      POSTGRES_DB: marketplace_db

volumes:
  postgres_data: