services:
  api:
    build: .
    container_name: marketplace_by_procrastination
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: marketplace_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: marketplace_frontend
    ports:
      - "3000:80"
    depends_on:
      - api


volumes:
  postgres_data: